<div class="w-[92vw] h-[90vh]
         fixed top-[52%] left-1/2
         -translate-x-1/2 -translate-y-1/2
         m-0 border-0 p-0
         bg-[blanchedalmond]
         shadow-[0_0_50px_rgba(8,0,112,0.9)]
         z-[5]">

    <div class="flex flex-col justify-between h-full">

        <button class="absolute flex items-center justify-center
                 right-[5px] top-[5px]
                 w-[30px] h-[30px] pb-[6px]
                 bg-[rgb(255,217,80)]
                 text-black font-extrabold text-2xl
                 rounded-full cursor-pointer"
          (click)="close()">
          &times;
        </button>

        <div class="m-[70px] text-[20px] text-left overflow-y-auto max-h-full">
          <ng-container
            *ngComponentOutlet="data.content">
          </ng-container>
        </div>

        <button class="w-full h-[35px]
                 self-center
                 bg-[rgb(255,217,80)]
                 font-bold text-[16px]
                 cursor-pointer"
          (click)="close()">
          RETURN
        </button>

    </div>

</div>
