version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: pcp_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: powerlifting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend/api
    container_name: pcp_backend
    restart: always
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/powerlifting
    depends_on:
      - postgres

volumes:
  postgres_data: